name: Generator listy produktow
on:
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Generuj liste produktow
        env:
          ALLEGRO_CLIENT_ID: ${{ secrets.ALLEGRO_CLIENT_ID }}
          ALLEGRO_CLIENT_SECRET: ${{ secrets.ALLEGRO_CLIENT_SECRET }}
        run: node generator.js
      - name: Zapisz wyniki
        run: |
          git config user.name "monitor-bot"
          git config user.email "bot@users.noreply.github.com"
          git add produkty.json
          git diff --cached --quiet || git commit -m "wygenerowano liste produktow"
          git push
